# Coworker Docker Compose — 轻量开发环境
#
# 适合 4G 内存服务器，不启动 Milvus（节省 ~2GB 内存）
#
# 使用方法:
#   docker-compose -f docker-compose-dev-fast.yml up --build
#
# 架构:
#   http://localhost:3000 (Go 后端 + Air 热重载 + 静态文件服务)
#   Go 文件修改 → Air 自动重编译
#   前端文件修改 → 手动重启: docker-compose -f docker-compose-dev-fast.yml restart web-dev
#
# 包含服务:
#   - web-dev          (Bun 构建前端，完成后退出)
#   - coworker-dev     (Go 后端 + Air 热重载)
#   - nsjail-sandbox   (Bash 命令沙箱隔离)
#   - redis            (缓存)
#   - postgres         (数据库)
#
# 不包含（节省内存）:
#   - Milvus + etcd + minio (向量搜索自动降级为 BM25 纯文本检索)

version: '3.4'

services:
  # 前端构建服务（构建完自动退出，不常驻）
  web-dev:
    image: oven/bun:latest
    container_name: web-dev
    restart: "no"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    working_dir: /app
    command: sh -c "bun install && bun run build"
    environment:
      - NODE_ENV=production

  # 后端开发服务 (Go + Air 热重载)
  coworker-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: coworker-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/tmp
      - ./userdata:/app/userdata
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - SQL_DSN=postgresql://root:Xm8%40Kp9%23vL5n%21Qw2%25Rt7%26Yz4@postgres:5432/coworker
      - REDIS_CONN_STRING=redis://redis
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true
      - DEBUG=true
      # Coworker / ClaudeCLI 配置
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN}
      - ANTHROPIC_API_BASE_URL=${ANTHROPIC_API_BASE_URL}
      - WORKSPACE_BASE_PATH=/app/userdata
      # nsjail 沙箱配置
      - NSJAIL_ENABLED=${NSJAIL_ENABLED:-true}
      - NSJAIL_CONTAINER_NAME=nsjail-sandbox
      - NSJAIL_MAX_CONCURRENT=${NSJAIL_MAX_CONCURRENT:-50}
      - NSJAIL_MEMORY_MB=${NSJAIL_MEMORY_MB:-512}
      - NSJAIL_EXEC_TIMEOUT=${NSJAIL_EXEC_TIMEOUT:-120}
      # Milvus 禁用（自动降级为 BM25 检索）
      - MILVUS_ENABLED=false
      # Embedding API 配置（保留以便后续启用 Milvus）
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-siliconflow}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-BAAI/bge-large-zh-v1.5}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-1024}
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY}
      - SILICONFLOW_BASE_URL=${SILICONFLOW_BASE_URL:-https://api.siliconflow.cn/v1}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - DASHSCOPE_BASE_URL=${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
    depends_on:
      - redis
      - postgres
      - nsjail-sandbox
    working_dir: /app
    command: air -c .air.toml
    group_add:
      - "999"  # docker 组 (Linux)

  # nsjail 沙箱服务
  nsjail-sandbox:
    build:
      context: ./docker/nsjail
      dockerfile: Dockerfile
    container_name: nsjail-sandbox
    restart: unless-stopped
    privileged: true
    volumes:
      - ./userdata:/userdata:rw

  redis:
    image: redis:latest
    container_name: redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15
    container_name: postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: Xm8@Kp9#vL5n!Qw2%Rt7&Yz4
      POSTGRES_DB: coworker
    volumes:
      - pg_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  pg_data_dev:
  web_node_modules:
