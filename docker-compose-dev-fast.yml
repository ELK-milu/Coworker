# Fast Development Docker Compose Configuration
# 使用 Vite 开发服务器，支持 HMR 热更新
#
# 使用方法:
#   # 首次运行需要先构建沙箱镜像 (如果启用容器隔离)
#   docker build -t coworker-sandbox:latest docker/sandbox/
#
#   docker-compose -f docker-compose-dev-fast.yml up
#
# 架构说明:
#   前端开发: http://localhost:5173 (Vite Dev Server + HMR)
#   后端 API: http://localhost:3000 (Go + Air)
#   Vite 自动代理 /api/* 到后端
#
# 特性:
#   - 前端修改即时生效（HMR，毫秒级）
#   - 后端修改自动重载（Air）
#   - 无需手动重启任何容器
#   - 容器隔离：Bash 命令在独立沙箱容器中执行

version: '3.4'

services:
  # 前端开发服务 (Vite Dev Server + HMR)
  web-dev:
    image: oven/bun:latest
    container_name: web-dev
    restart: unless-stopped
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    working_dir: /app
    ports:
      - "5173:5173"
    command: sh -c "bun install && bun run dev -- --host 0.0.0.0"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://new-api-dev:3000

  # 后端开发服务 (Go + Air)
  new-api-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: new-api-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/tmp
      - ./userdata:/app/userdata
      # Docker socket - 允许后端管理沙箱容器
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - SQL_DSN=postgresql://root:Xm8%40Kp9%23vL5n%21Qw2%25Rt7%26Yz4@postgres:5432/new-api
      - REDIS_CONN_STRING=redis://redis
      - TZ=Asia/Shanghai
      - DEBUG=true
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN}
      - ANTHROPIC_API_BASE_URL=${ANTHROPIC_API_BASE_URL}
      - WORKSPACE_BASE_PATH=/app/userdata
      # 容器隔离配置 (可选，设为 true 启用)
      - CONTAINER_ENABLED=${CONTAINER_ENABLED:-false}
      - CONTAINER_RUNTIME=${CONTAINER_RUNTIME:-}
      - CONTAINER_IMAGE=${CONTAINER_IMAGE:-coworker-sandbox:latest}
      - CONTAINER_MEMORY_MB=${CONTAINER_MEMORY_MB:-256}
      - CONTAINER_CPU_QUOTA=${CONTAINER_CPU_QUOTA:-0.5}
      - CONTAINER_PID_LIMIT=${CONTAINER_PID_LIMIT:-100}
      - CONTAINER_DISK_MB=${CONTAINER_DISK_MB:-250}
      - CONTAINER_IDLE_TIMEOUT=${CONTAINER_IDLE_TIMEOUT:-30}
      # Docker-in-Docker: 宿主机上 userdata 的绝对路径
      - CONTAINER_HOST_BASE_PATH=${CONTAINER_HOST_BASE_PATH:-${PWD}/userdata}
    depends_on:
      - redis
      - postgres
    working_dir: /app
    command: air -c .air.toml
    # 需要访问 Docker socket
    group_add:
      - "999"  # docker 组 (Linux)

  redis:
    image: redis:latest
    container_name: redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15
    container_name: postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: Xm8@Kp9#vL5n!Qw2%Rt7&Yz4
      POSTGRES_DB: new-api
    volumes:
      - pg_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  pg_data_dev:
  web_node_modules:
