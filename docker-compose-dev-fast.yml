# Fast Development Docker Compose Configuration
# 使用 Vite 开发服务器，支持 HMR 热更新
#
# 使用方法:
#   docker-compose -f docker-compose-dev-fast.yml up
#
# 架构说明:
#   前端开发: http://localhost:5173 (Vite Dev Server + HMR)
#   后端 API: http://localhost:3000 (Go + Air)
#   Vite 自动代理 /api/* 到后端
#
# 特性:
#   - 前端修改即时生效（HMR，毫秒级）
#   - 后端修改自动重载（Air）
#   - 无需手动重启任何容器

version: '3.4'

services:
  # 前端开发服务 (Vite Dev Server + HMR)
  web-dev:
    image: oven/bun:latest
    container_name: web-dev
    restart: unless-stopped
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    working_dir: /app
    ports:
      - "5173:5173"
    command: sh -c "bun install && bun run dev -- --host 0.0.0.0"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://new-api-dev:3000

  # 后端开发服务 (Go + Air)
  new-api-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: new-api-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/tmp
      - ./userdata:/app/userdata
    environment:
      - SQL_DSN=postgresql://root:Xm8%40Kp9%23vL5n%21Qw2%25Rt7%26Yz4@postgres:5432/new-api
      - REDIS_CONN_STRING=redis://redis
      - TZ=Asia/Shanghai
      - DEBUG=true
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN}
      - ANTHROPIC_API_BASE_URL=${ANTHROPIC_API_BASE_URL}
      - WORKSPACE_BASE_PATH=/app/userdata
    depends_on:
      - redis
      - postgres
    working_dir: /app
    command: air -c .air.toml

  redis:
    image: redis:latest
    container_name: redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15
    container_name: postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: Xm8@Kp9#vL5n!Qw2%Rt7&Yz4
      POSTGRES_DB: new-api
    volumes:
      - pg_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  pg_data_dev:
  web_node_modules:
