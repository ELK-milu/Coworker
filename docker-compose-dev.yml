# Development Docker Compose Configuration
# 简化的本地开发方式
#
# 使用方法:
#   docker-compose -f docker-compose-dev.yml up
#
# 架构说明:
#   开发时访问: http://localhost:3000 (后端服务)
#       ↓
#   Go 后端 (3000) + Air 热重载 + 静态文件服务
#       ↓
#   前端构建产物 (web/dist)
#
# 特性:
#   - 统一入口：http://localhost:3000
#   - 后端：Go + Air 热重载
#   - 前端：bun build 构建静态文件，修改后手动重启 web-dev 容器
#
# 前端修改后重新构建:
#   docker-compose -f docker-compose-dev.yml restart web-dev

version: '3.4'

services:
  # 前端构建服务 (Bun + Vite Build)
  web-dev:
    image: oven/bun:latest
    container_name: web-dev
    restart: "no"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    working_dir: /app
    command: sh -c "bun install && bun run build"
    environment:
      - NODE_ENV=production

  # 后端开发服务 (Go + Air)
  new-api-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: new-api-dev
    restart: unless-stopped
    ports:
      - "3000:3000"  # Go API 服务端口
    volumes:
      # 挂载源代码（实时更新）
      - .:/app
      # 排除构建产物
      - /app/tmp
    environment:
      - SQL_DSN=postgresql://root:Xm8%40Kp9%23vL5n%21Qw2%25Rt7%26Yz4@postgres:5432/new-api
      - REDIS_CONN_STRING=redis://redis
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true
      - DEBUG=true
      # Agent 配置
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN}
      - ANTHROPIC_API_BASE_URL=${ANTHROPIC_API_BASE_URL}
      - WORKSPACE_BASE_PATH=/data/users
    depends_on:
      - redis
      - postgres
    working_dir: /app
    command: air -c .air.toml

  redis:
    image: redis:latest
    container_name: redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15
    container_name: postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: Xm8@Kp9#vL5n!Qw2%Rt7&Yz4
      POSTGRES_DB: new-api
    volumes:
      - pg_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  pg_data_dev:
  web_node_modules:
