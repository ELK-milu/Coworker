# Development Docker Compose Configuration
# 简化的本地开发方式
#
# 使用方法:
#   docker-compose -f docker-compose-dev.yml up --build
#
# 架构说明:
#   开发时访问: http://localhost:3000 (后端服务)
#       ↓
#   Go 后端 (3000) + Air 热重载 + 静态文件服务
#       ↓
#   前端构建产物 (web/dist)
#
# 特性:
#   - 统一入口：http://localhost:3000
#   - 后端：Go + Air 热重载
#   - 前端：bun build 构建静态文件，修改后手动重启 web-dev 容器
#   - 沙箱隔离：Bash 命令在独立 nsjail 容器中执行
#
# 前端修改后重新构建:
#   docker-compose -f docker-compose-dev.yml restart web-dev

version: '3.4'

services:
  # 前端构建服务 (Bun + Vite Build)
  web-dev:
    image: oven/bun:latest
    container_name: web-dev
    restart: "no"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
      - web_vite_cache:/app/node_modules/.vite
    working_dir: /app
    command: sh -c "bun install && bun run build"
    environment:
      - NODE_ENV=production

  # 后端开发服务 (Go + Air)
  new-api-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: new-api-dev
    restart: unless-stopped
    ports:
      - "3000:3000"  # Go API 服务端口
    volumes:
      # 挂载源代码（实时更新）
      - .:/app
      # 排除构建产物
      - /app/tmp
      # 用户数据目录
      - ./userdata:/app/userdata
      # Docker socket - 允许后端管理沙箱容器
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - SQL_DSN=postgresql://root:Xm8%40Kp9%23vL5n%21Qw2%25Rt7%26Yz4@postgres:5432/new-api
      - REDIS_CONN_STRING=redis://redis
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true
      - DEBUG=true
      # Agent 配置
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN}
      - ANTHROPIC_API_BASE_URL=${ANTHROPIC_API_BASE_URL}
      - WORKSPACE_BASE_PATH=/app/userdata
      # Nsjail 沙箱配置
      - NSJAIL_ENABLED=${NSJAIL_ENABLED:-true}
      - NSJAIL_CONTAINER_NAME=nsjail-sandbox
      - NSJAIL_MAX_CONCURRENT=${NSJAIL_MAX_CONCURRENT:-50}
      - NSJAIL_MEMORY_MB=${NSJAIL_MEMORY_MB:-512}
      - NSJAIL_EXEC_TIMEOUT=${NSJAIL_EXEC_TIMEOUT:-120}
      # Milvus 向量数据库配置
      - MILVUS_ENABLED=${MILVUS_ENABLED:-true}
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - MILVUS_COLLECTION=${MILVUS_COLLECTION:-claude_memories}
      # Embedding API 配置
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-siliconflow}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-BAAI/bge-large-zh-v1.5}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-1024}
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY}
      - SILICONFLOW_BASE_URL=${SILICONFLOW_BASE_URL:-https://api.siliconflow.cn/v1}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - DASHSCOPE_BASE_URL=${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
    depends_on:
      - redis
      - postgres
      - nsjail-sandbox
      - milvus
    working_dir: /app
    command: air -c .air.toml

  # nsjail 沙箱服务 (独立容器)
  # 使用 Linux namespaces 提供进程级隔离
  # 后端通过 docker exec 调用此容器执行命令
  nsjail-sandbox:
    build:
      context: ./docker/nsjail
      dockerfile: Dockerfile
    container_name: nsjail-sandbox
    restart: unless-stopped
    privileged: true
    volumes:
      # 用户数据目录 - 与后端共享
      - ./userdata:/userdata:rw

  redis:
    image: redis:latest
    container_name: redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15
    container_name: postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: Xm8@Kp9#vL5n!Qw2%Rt7&Yz4
      POSTGRES_DB: new-api
    volumes:
      - pg_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # -------------------- Milvus 向量数据库 --------------------
  # Milvus Standalone 模式，用于记忆系统的向量搜索
  # 依赖 etcd 和 minio 作为元数据存储和对象存储
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: milvus-etcd
    restart: unless-stopped
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: milvus-minio
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    image: milvusdb/milvus:v2.5.6
    container_name: milvus
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    restart: unless-stopped
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MILVUS_LOG_LEVEL: error
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"  # Milvus gRPC 端口
      - "9091:9091"    # Milvus 健康检查端口
    depends_on:
      - etcd
      - minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 60s
      start_period: 120s
      timeout: 30s
      retries: 5


volumes:
  pg_data_dev:
  web_node_modules:
  web_vite_cache:
  etcd_data:
  minio_data:
  milvus_data:
