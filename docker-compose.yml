# Coworker Docker Compose — 生产部署
#
# 使用方法:
#   1. cp .env.example .env && 编辑 .env 填入必要配置
#   2. docker-compose up -d --build
#   3. 访问 http://localhost:3000
#   4. 默认账号: root / 123456
#
# 从源码构建镜像（多阶段: Bun 构建前端 → Go 编译后端 → Debian slim 运行）
#
# ⚠️ 生产部署前请修改所有默认密码！

version: '3.4'

services:
  coworker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coworker
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
      - ./userdata:/app/userdata
      # Docker socket — 允许后端管理 nsjail 沙箱容器
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - SQL_DSN=postgresql://root:Xm8%40Kp9%23vL5n%21Qw2%25Rt7%26Yz4@postgres:5432/coworker?sslmode=disable
      - REDIS_CONN_STRING=redis://redis
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true
      # 会话密钥 — 多机部署必须修改！
      # - SESSION_SECRET=random_string
      # Coworker / ClaudeCLI 配置
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN}
      - ANTHROPIC_API_BASE_URL=${ANTHROPIC_API_BASE_URL}
      - WORKSPACE_BASE_PATH=/app/userdata
      # nsjail 沙箱配置
      - NSJAIL_ENABLED=${NSJAIL_ENABLED:-true}
      - NSJAIL_CONTAINER_NAME=nsjail-sandbox
      - NSJAIL_MAX_CONCURRENT=${NSJAIL_MAX_CONCURRENT:-50}
      - NSJAIL_MEMORY_MB=${NSJAIL_MEMORY_MB:-512}
      - NSJAIL_EXEC_TIMEOUT=${NSJAIL_EXEC_TIMEOUT:-120}
      # Milvus 向量数据库（可选，禁用时自动降级为 BM25 检索）
      - MILVUS_ENABLED=${MILVUS_ENABLED:-false}
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      # Embedding API 配置
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-siliconflow}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-BAAI/bge-large-zh-v1.5}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-1024}
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
      nsjail-sandbox:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # nsjail 沙箱服务 — Bash 命令在隔离环境中执行
  nsjail-sandbox:
    build:
      context: ./docker/nsjail
      dockerfile: Dockerfile
    container_name: nsjail-sandbox
    restart: always
    privileged: true
    volumes:
      - ./userdata:/userdata:rw

  redis:
    image: redis:latest
    container_name: redis
    restart: always

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: Xm8@Kp9#vL5n!Qw2%Rt7&Yz4  # ⚠️ 生产环境请修改！
      POSTGRES_DB: coworker
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d coworker"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
