# nsjail 沙箱配置文件
# 用于 Coworker Bash 命令执行隔离

name: "coworker-sandbox"
description: "Sandbox for executing user commands"

mode: ONCE
hostname: "sandbox"
cwd: "/workspace"

# 时间限制 (秒) - 由命令行参数覆盖
time_limit: 120

# 资源限制
rlimit_as_type: SOFT
rlimit_cpu_type: SOFT
rlimit_fsize_type: SOFT
rlimit_nofile_type: SOFT

rlimit_as: 512        # 虚拟内存 512MB
rlimit_cpu: 120       # CPU 时间 120秒
rlimit_fsize: 64      # 文件大小 64MB
rlimit_nofile: 256    # 文件描述符数量

# 进程限制
max_cpus: 1

# 网络隔离 (禁用网络)
clone_newnet: true

# Namespace 隔离
clone_newuser: true
clone_newns: true
clone_newpid: true
clone_newipc: true
clone_newuts: true
clone_newcgroup: true

# 只读挂载系统目录
mount {
    src: "/bin"
    dst: "/bin"
    is_bind: true
    rw: false
}

mount {
    src: "/lib"
    dst: "/lib"
    is_bind: true
    rw: false
}

mount {
    src: "/lib64"
    dst: "/lib64"
    is_bind: true
    rw: false
    mandatory: false
}

mount {
    src: "/usr"
    dst: "/usr"
    is_bind: true
    rw: false
}

# /tmp 临时目录 (tmpfs)
mount {
    dst: "/tmp"
    fstype: "tmpfs"
    rw: true
    options: "size=64M"
}

# /dev 设备目录 (最小化)
mount {
    dst: "/dev"
    fstype: "tmpfs"
    rw: true
}

mount {
    src: "/dev/null"
    dst: "/dev/null"
    is_bind: true
    rw: true
}

mount {
    src: "/dev/zero"
    dst: "/dev/zero"
    is_bind: true
    rw: false
}

mount {
    src: "/dev/urandom"
    dst: "/dev/urandom"
    is_bind: true
    rw: false
}

# /proc 文件系统
mount {
    dst: "/proc"
    fstype: "proc"
    rw: false
}

# /workspace 用户工作目录 - 由命令行参数动态挂载
# --bindmount /app/userdata/{user_id}/workspace:/workspace:rw

